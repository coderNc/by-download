name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v1.2.3. Leave empty to only run packaging."
        required: false
        type: string
      draft:
        description: "Create the GitHub Release as draft."
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as prerelease."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_version="${release_tag#v}"
            draft="false"
            if [[ "$release_tag" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
            should_publish="true"
          else
            input_tag="${{ inputs.release_tag }}"
            if [[ -n "$input_tag" ]]; then
              if [[ "$input_tag" == v* ]]; then
                release_tag="$input_tag"
              else
                release_tag="v$input_tag"
              fi
              release_version="${release_tag#v}"
              should_publish="true"
            else
              release_tag=""
              release_version=""
              should_publish="false"
            fi
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

  build-mac:
    runs-on: macos-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Sync release version
        if: needs.meta.outputs.release_version != ''
        run: node ./scripts/set-release-version.mjs "${{ needs.meta.outputs.release_version }}"

      - name: Build macOS DMG
        env:
          PYTHON_EXECUTABLE: python
        run: pnpm --dir desktop run pack:mac:dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop/dist-installers/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Sync release version
        if: needs.meta.outputs.release_version != ''
        run: node ./scripts/set-release-version.mjs "${{ needs.meta.outputs.release_version }}"

      - name: Build Windows installer
        env:
          PYTHON_EXECUTABLE: python
        run: pnpm --dir desktop run pack:win:exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: desktop/dist-installers/*.exe
          if-no-files-found: error

  release:
    if: needs.meta.outputs.should_publish == 'true'
    needs:
      - meta
      - build-mac
      - build-win
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          name: ${{ needs.meta.outputs.release_tag }}
          draft: ${{ needs.meta.outputs.draft == 'true' }}
          prerelease: ${{ needs.meta.outputs.prerelease == 'true' }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
          generate_release_notes: true
